[flow]
profile = "lens_experiment_frame"
policy = "fixed"
budget = 12
max_feedback_cycles = 0

[actor_scaling]
default_mode = "fixed"
max_total_actors = 4
max_parallel_actors = 1

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reason]
adapter = "cli"
command = "claude"
model = "claude-sonnet-4-6"
max_tokens = 1500
timeout_seconds = 600

[stages.analysis]
organ = "reason"
inputs = ["path:task.md"]
outputs = ["observation", "question", "decision"]
budget = 12

[stages.analysis.actors]
mode = "fixed"
count = 4
roles = ["RISK", "ECON", "TOC", "REVERS"]
