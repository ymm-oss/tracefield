# Arm O on ollama qwen3.6:27b — 5観点を隔離発見 → reconcile つき testgen で統合。
[flow]
profile = "testgen-perspective-discovery-ollama"
policy = "fixed"

[actor_scaling]
default_mode = "fixed"
max_total_actors = 30
max_parallel_actors = 1

[organs.reasoning]
adapter = "ollama"
model = "qwen3.6:27b"
max_tokens = 2500
timeout_seconds = 600

[organs.deep]
adapter = "ollama"
model = "qwen3.6:27b"
max_tokens = 4000
timeout_seconds = 600

[stages.testlenses]
organ = "reasoning"
inputs = ["path:task.md", "kind:input"]
outputs = ["decision"]
[stages.testlenses.actors]
mode = "fixed"
count = 5
roles = ["T_BOUNDARY", "T_ADVERSARIAL", "T_STRUCTURE", "T_PROPERTY", "T_AMBIGUITY"]

[stages.testgen]
organ = "deep"
inputs = ["stage:testlenses", "path:task.md", "kind:input"]
outputs = ["synthesis"]
[stages.testgen.actors]
mode = "fixed"
count = 1
roles = ["T_TESTGEN"]
