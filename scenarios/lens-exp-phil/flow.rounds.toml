[flow]
profile = "lens_experiment_phil_r2"
policy = "fixed"
budget = 24
max_feedback_cycles = 0

[long_run]
enabled = true
cycles = 2
cycle_stages = ["analysis"]

[actor_scaling]
default_mode = "fixed"
max_total_actors = 4
max_parallel_actors = 1

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reason]
adapter = "cli"
command = "claude"
model = "claude-sonnet-4-6"
max_tokens = 1500
timeout_seconds = 600

[stages.analysis]
organ = "reason"
inputs = ["path:task.md", "stage:analysis"]
outputs = ["observation", "question", "decision"]
budget = 24

[stages.analysis.actors]
mode = "fixed"
count = 4
roles = ["UTIL", "DEONT", "PHENO", "GENEA"]
