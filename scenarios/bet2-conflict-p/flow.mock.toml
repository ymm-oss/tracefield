# Arm O の配線確認用(model-free)。組構造は flow.toml と同一、organ だけ mock。
[flow]
profile = "bet2-position-tournament-mock"
policy = "fixed"

[actor_scaling]
default_mode = "fixed"
max_total_actors = 40
max_parallel_actors = 3

[organs.reasoning]
adapter = "mock"

[organs.deep]
adapter = "mock"

[stages.directions]
organ = "reasoning"
inputs = ["path:task.md", "kind:input"]
outputs = ["decision"]
[stages.directions.actors]
mode = "fixed"
count = 6
roles = ["SHIP", "DATA", "INVERT", "HARM", "LINEAGE", "ANALOGY"]

[stages.critique]
organ = "reasoning"
inputs = ["stage:directions"]
outputs = ["observation"]
[stages.critique.actors]
mode = "per_input"
roles = ["CRITIQUE"]

[stages.adjudication]
organ = "reasoning"
inputs = ["stage:critique"]
outputs = ["decision"]
retract_overturned = true
[stages.adjudication.actors]
mode = "per_input"
roles = ["ADJ"]

[stages.select]
organ = "reasoning"
inputs = ["stage:directions", "stage:adjudication"]
outputs = ["synthesis"]
[stages.select.actors]
mode = "fixed"
count = 1
roles = ["SELECT"]

[stages.initiatives]
organ = "deep"
inputs = ["stage:select"]
outputs = ["synthesis", "decision"]
[stages.initiatives.actors]
mode = "fixed"
count = 1
roles = ["INITIATIVES"]
