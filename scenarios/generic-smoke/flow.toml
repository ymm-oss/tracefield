[flow]
profile = "default"
policy = "fixed"
budget = 20

[actor_scaling]
default_mode = "fixed"
max_total_actors = 4

[organs.reasoning]
adapter = "mock"

[stages.analysis]
organ = "reasoning"
outputs = ["observation", "synthesis"]

[stages.analysis.actors]
mode = "per_agent"

[artifacts.summary]
format = "markdown"
from_stage = "analysis"
path = "outputs/summary.md"
