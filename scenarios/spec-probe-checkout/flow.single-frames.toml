# Arm S1 — 同じ5枠を1文脈で与えた単一(arm-W対照)
[flow]
profile = "spec-probe-single-frames"
policy = "fixed"
[actor_scaling]
default_mode = "fixed"
max_total_actors = 4
max_parallel_actors = 1
[organs.reasoning]
adapter = "codex-app-server"
timeout_seconds = 600
[stages.interrogate]
organ = "reasoning"
inputs = ["path:task.md", "kind:input"]
outputs = ["observation", "question"]
[stages.interrogate.actors]
mode = "fixed"
count = 1
roles = ["SINGLE_FRAMES"]
