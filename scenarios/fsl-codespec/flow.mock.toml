[flow]
profile = "code-to-fsl-grounded-extraction"
policy = "fixed"

[actor_scaling]
default_mode = "fixed"
max_total_actors = 40
max_parallel_actors = 3

[organs.reasoning]
adapter = "mock"

[stages.evidence]
organ = "reasoning"
inputs = ["kind:input"]
outputs = ["observation"]
[stages.evidence.actors]
mode = "per_input"
roles = ["EVIDENCE"]

[stages.spec_draft]
organ = "reasoning"
inputs = ["stage:evidence"]
outputs = ["decision"]
[stages.spec_draft.actors]
mode = "per_input"
roles = ["SPEC"]

[stages.verify]
organ = "reasoning"
inputs = ["stage:spec_draft"]
outputs = ["observation", "question"]
[stages.verify.actors]
mode = "fixed"
count = 4
roles = ["INVARIANT", "TRANSITION", "CONTRACT", "COVERAGE"]

[stages.gate_grounding]
organ = "reasoning"
inputs = ["stage:spec_draft"]
outputs = ["observation"]
[stages.gate_grounding.actors]
mode = "fixed"
count = 1
roles = ["GROUND"]

[stages.adjudication]
organ = "reasoning"
inputs = ["stage:verify"]
outputs = ["decision"]
[stages.adjudication.actors]
mode = "per_input"
roles = ["ADJ"]

[stages.assemble]
organ = "reasoning"
inputs = ["path:task.md", "stage:spec_draft", "stage:verify", "stage:gate_grounding", "stage:adjudication"]
outputs = ["synthesis"]
[stages.assemble.actors]
mode = "fixed"
count = 1
roles = ["ASSEMBLE"]
