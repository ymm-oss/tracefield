[flow]
profile = "code-to-fsl-grounded-extraction"
policy = "fixed"

[actor_scaling]
default_mode = "fixed"
max_total_actors = 40
max_parallel_actors = 3

[organs.reasoning]
adapter = "codex-app-server"
timeout_seconds = 600

# 段1: 証拠抽出。1 actor = 1 領域ポインタ。実コードを再オープンし領域マップ＋出典付き生事実を出す
[stages.evidence]
organ = "reasoning"
inputs = ["kind:input"]
outputs = ["observation"]
[stages.evidence.actors]
mode = "per_input"
roles = ["EVIDENCE"]

# 段2: 仕様起草（read 時の再接地）。1 actor = 1 領域ダイジェスト。当該領域を再オープンし FSL 主張を relies_on 付きで書く
# inputs は stage:evidence のみ（per_input のシャード軸を領域ダイジェストに揃える。task.md を入れると task が1シャードになる）
[stages.spec_draft]
organ = "reasoning"
inputs = ["stage:evidence"]
outputs = ["decision"]
[stages.spec_draft.actors]
mode = "per_input"
roles = ["SPEC"]

# 段3: verify（reject 時の再接地）。直交アスペクトの反証。各 actor が引用行を再オープンして攻撃
[stages.verify]
organ = "reasoning"
inputs = ["stage:spec_draft"]
outputs = ["observation", "question"]
[stages.verify.actors]
mode = "fixed"
count = 4
roles = ["INVARIANT", "TRANSITION", "CONTRACT", "COVERAGE"]

# 段4: 接地ゲート。false precision を [接地]/[暫定]/[未検証] に分類し根拠導出 or プローブ化に強制変換
[stages.gate_grounding]
organ = "reasoning"
inputs = ["stage:spec_draft"]
outputs = ["observation"]
[stages.gate_grounding.actors]
mode = "fixed"
count = 1
roles = ["GROUND"]

# 段5: 反証1件 = 隔離審判1。判定者は自ら引用行を再オープンして確認。
# retract_overturned: 結論変更の判定が指す反証の meta.refutes 主張を機械的に retract（生存判定を LLM から剥がす＝不変条件①）
[stages.adjudication]
organ = "reasoning"
inputs = ["stage:verify"]
outputs = ["decision"]
retract_overturned = true
[stages.adjudication.actors]
mode = "per_input"
roles = ["ADJ"]

# 段6: 組み上げ。接地かつ反証を生き延びた主張だけを FSL 整合仕様に畳む。落とした主張は理由つき明示
[stages.assemble]
organ = "reasoning"
inputs = ["path:task.md", "stage:spec_draft", "stage:verify", "stage:gate_grounding", "stage:adjudication"]
outputs = ["synthesis"]
[stages.assemble.actors]
mode = "fixed"
count = 1
roles = ["ASSEMBLE"]

# 段7: fslc ゲート（決定論コマンドステージ＝第二の機械裁定。LLM 不使用＝confab 原理ゼロ）。
# assemble の ```fsl を抽出し fslc check→verify。結果は assemble を引用する observation
# （retract 閉包内・stdout=本文・exit を meta.exit_code）。非ゼロは所見として残り run は止まらない。
# repair は可視の再実行（silent recompute しない＝不変条件③）。fslc は組み上がった成果物にのみ効く→assemble の後段。
[stages.fslc_gate]
inputs = ["stage:assemble"]
outputs = ["observation"]
[stages.fslc_gate.actors]
mode = "none"
[stages.fslc_gate.command]
program = "bash"
args = ["-lc", "awk 'BEGIN{f=0}/^```fsl/{f=1;next}/^```/{f=0;next}f' \"$0\" > \"$0.fsl\" && echo '== fslc check ==' && fslc check \"$0.fsl\" && echo '== fslc verify ==' && fslc verify \"$0.fsl\"", "{input}"]
timeout_seconds = 600
