# 配線スモーク(mock 器官): scatter→norm→cluster→synthesis がモデル無しで通るか検証する。
[flow]
profile = "qwen-coding-task-ideation"
policy = "fixed"
budget = 60
max_feedback_cycles = 0

[actor_scaling]
default_mode = "fixed"
max_total_actors = 8
max_parallel_actors = 3

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reason]
adapter = "mock"
model = "qwen3.6:27b"
timeout_seconds = 600

[stages.scatter]
organ = "reason"
inputs = ["path:task.md"]
outputs = ["observation"]
budget = 40

[stages.scatter.actors]
mode = "fixed"
count = 5
roles = ["SC_LOCAL", "SC_VOLUME", "SC_LOOP", "SC_STRUCTURE", "SC_SCAFFOLD"]

[stages.norm]
organ = "reason"
inputs = ["stage:scatter"]
outputs = ["observation"]
budget = 10

[stages.norm.actors]
mode = "fixed"
count = 1
roles = ["NORM"]

[stages.cluster]
inputs = ["stage:norm"]
outputs = ["synthesis"]
budget = 10

[stages.cluster.clustering]
enabled = true
by = ["kind"]
min_cluster_size = 1
max_clusters = 8

[stages.cluster.actors]
mode = "none"
roles = ["clusterer"]

[stages.synthesis]
organ = "reason"
inputs = ["stage:cluster", "stage:scatter"]
outputs = ["observation", "decision"]
budget = 10

[stages.synthesis.actors]
mode = "fixed"
count = 1
roles = ["SYNTH"]
