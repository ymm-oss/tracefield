[flow]
profile = "lens_ctrl_small_synth"
policy = "fixed"
budget = 20
max_feedback_cycles = 0

[actor_scaling]
default_mode = "fixed"
max_total_actors = 6
max_parallel_actors = 1

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reason]
adapter = "cli"
command = "claude"
model = "claude-sonnet-4-6"
max_tokens = 1500
timeout_seconds = 600

[stages.analysis]
organ = "reason"
inputs = ["path:task.md"]
outputs = ["observation", "decision"]
budget = 9

[stages.analysis.actors]
mode = "fixed"
count = 3
roles = ["UTIL", "DEONT", "PHENO"]

[stages.verify]
organ = "reason"
inputs = ["stage:analysis"]
outputs = ["question"]
budget = 3

[stages.verify.actors]
mode = "fixed"
count = 1
roles = ["FALSIFY"]

[stages.synthesis]
organ = "reason"
inputs = ["stage:analysis", "stage:verify"]
outputs = ["observation", "decision"]
budget = 4

[stages.synthesis.actors]
mode = "fixed"
count = 1
roles = ["SYNTH"]
