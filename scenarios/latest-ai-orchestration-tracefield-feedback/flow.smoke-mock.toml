[flow]
profile = "smoke_mock_single_stage"
policy = "fixed"
budget = 5
max_feedback_cycles = 0

[actor_scaling]
default_mode = "fixed"
max_total_actors = 1

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reasoning]
adapter = "mock"

[stages.source_extract]
organ = "reasoning"
inputs = ["kind:input"]
outputs = ["observation", "question"]
budget = 5

[stages.source_extract.actors]
mode = "fixed"
count = 1
roles = ["data_actor"]
