[flow]
profile = "ds4_complete_report_deck"
policy = "fixed"
budget = 80
max_feedback_cycles = 0

[process]
enabled = true
organ = "reasoning"
mode = "ds4_complete_report_deck"
agent_count = 1
artifact_after_feedback = true
artifact_stages = ["artifact_strategy", "report_finalize", "deck_finalize"]

[process.gates]
enforce_artifact_gate = true
allow_conditional_artifacts = false
require_citations = true
require_evidence_quotes = true
block_publish_on_open_questions = true
block_publish_on_quality_warnings = false
require_manifest = true

[process.stop]
max_cycles = 1
max_feedback_cycles = 0
stop_when = ["audit_passed", "artifact_publishable"]

[actor_scaling]
default_mode = "fixed"
max_total_actors = 8
max_parallel_actors = 1

[feedback]
enabled = false
max_requests_per_cycle = 0

[feedback_entries]
enabled = true
kind = "tracefield_feedback"
accepted_types = ["change", "requirement", "answer", "audit"]
status_field = "status"
max_requests_per_cycle = 0
dedupe_by = ["target", "action", "normalized_request"]

[organs.data]
adapter = "cli"
command = "/Users/rizumita/Workspace/github/ds4/ds4"
model = "/Users/rizumita/Workspace/github/ds4/ds4flash.gguf"
max_tokens = 620
timeout_seconds = 900

[organs.reasoning]
adapter = "cli"
command = "codex"
model = "codex"
timeout_seconds = 900

[stages.source_discovery]
organ = "reasoning"
inputs = ["kind:input"]
outputs = ["observation", "requirement"]
budget = 8

[stages.source_discovery.context]
mode = "source_excerpt"
chars_per_entry = 1000
chars_total = 5000
keywords = ["agent orchestration", "handoffs", "StateGraph", "guardrails", "tracing", "provenance", "manifest", "evals"]

[stages.source_discovery.actors]
mode = "fixed"
count = 1
roles = ["source_discovery"]

[stages.source_cluster]
inputs = ["kind:input"]
outputs = ["synthesis"]
budget = 6

[stages.source_cluster.clustering]
enabled = true
by = ["path_parent", "path"]
max_clusters = 8

[stages.source_cluster.actors]
mode = "none"
roles = ["source_clusterer"]

[stages.source_extract_orchestration]
organ = "data"
inputs = ["path:inputs/web/01-openai-github-io-openai-agents-python.md", "path:inputs/web/02-openai-github-io-openai-agents-python-multi-agent.md", "path:inputs/web/03-docs-langchain-com-oss-python-langgraph-graph-api.md", "path:inputs/web/04-microsoft-github-io-autogen-stable-user-guide-agentchat-user-guide-tutorial-team.md", "path:inputs/web/07-modelcontextprotocol-io-specification-2025-06-18.md"]
outputs = ["observation", "question"]
budget = 18

[stages.source_extract_orchestration.context]
mode = "source_excerpt"
chars_per_entry = 2400
chars_total = 8200
keywords = ["handoffs", "agents as tools", "supervisor", "manager", "Graph API", "StateGraph", "nodes", "edges", "conditional edges", "entry point", "MCP", "tools", "resources", "prompts"]

[stages.source_extract_orchestration.actors]
mode = "fixed"
count = 1
roles = ["data_actor"]

[stages.source_extract_governance]
organ = "data"
inputs = ["path:inputs/web-supplement/01-developers-openai-com-api-docs-guides-evals.md", "path:inputs/web-supplement/02-developers-openai-com-api-docs-guides-production-best-practices.md", "path:inputs/web-supplement/03-openai-github-io-openai-agents-python-tracing.md", "path:inputs/web-supplement/04-openai-github-io-openai-agents-python-guardrails.md", "path:inputs/web-supplement/07-learn-microsoft-com-en-us-azure-foundry-concepts-observability.md", "path:inputs/web-supplement/08-www-nist-gov-itl-ai-risk-management-framework.md", "path:inputs/web-supplement/09-www-w3-org-tr-prov-overview.md", "path:inputs/web-supplement/10-spec-c2pa-org-specifications-specifications-2-4-specs-c2pa-specification-html.md"]
outputs = ["observation", "question"]
budget = 18

[stages.source_extract_governance.context]
mode = "source_excerpt"
chars_per_entry = 2600
chars_total = 9200
keywords = ["The Agents SDK includes built-in tracing", "By default, the SDK traces the following", "Certain spans may capture potentially sensitive data", "Tool guardrails wrap function tools", "Handoffs run through the SDK's handoff pipeline", "Provenance is information about entities, activities, and people", "For structured text formats that support front matter", "C2PA Manifest block shall appear inside that front matter", "evals", "dataset"]

[stages.source_extract_governance.actors]
mode = "fixed"
count = 1
roles = ["data_actor"]

[stages.question_resolution]
organ = "reasoning"
inputs = ["entry_type:question", "stage:source_extract_orchestration", "stage:source_extract_governance", "stage:source_discovery"]
outputs = ["answer", "decision", "requirement"]
budget = 10

[stages.question_resolution.actors]
mode = "fixed"
count = 1
roles = ["question_resolver"]

[stages.hypothesis]
organ = "reasoning"
inputs = ["stage:source_discovery", "stage:source_cluster", "stage:source_extract_orchestration", "stage:source_extract_governance", "stage:question_resolution"]
outputs = ["hypothesis", "requirement"]
budget = 12

[stages.hypothesis.actors]
mode = "fixed"
count = 1
roles = ["synthesizer"]

[stages.lens_analysis]
organ = "reasoning"
inputs = ["stage:hypothesis", "stage:source_extract_orchestration", "stage:source_extract_governance", "stage:question_resolution"]
outputs = ["synthesis", "audit", "requirement"]
budget = 14

[stages.lens_analysis.actors]
mode = "fixed"
count = 1
roles = ["technical"]

[stages.audit]
organ = "reasoning"
inputs = ["stage:lens_analysis", "stage:hypothesis", "stage:source_extract_orchestration", "stage:source_extract_governance", "stage:question_resolution"]
outputs = ["audit", "requirement", "decision"]
budget = 12

[stages.audit.actors]
mode = "fixed"
count = 1
roles = ["citation_auditor"]

[stages.feedback_triage]
organ = "reasoning"
inputs = ["stage:audit", "stage:lens_analysis", "stage:question_resolution"]
outputs = ["change", "requirement", "decision", "answer"]
budget = 8

[stages.feedback_triage.actors]
mode = "fixed"
count = 1
roles = ["feedback_router"]

[stages.artifact_strategy]
organ = "reasoning"
inputs = ["stage:feedback_triage", "stage:audit", "stage:lens_analysis", "stage:source_extract_orchestration", "stage:source_extract_governance"]
outputs = ["synthesis", "decision"]
budget = 8

[stages.artifact_strategy.actors]
mode = "fixed"
count = 1
roles = ["artifact_strategist"]

[stages.report_finalize]
organ = "reasoning"
inputs = ["stage:artifact_strategy", "stage:feedback_triage", "stage:audit", "stage:lens_analysis", "stage:source_extract_orchestration", "stage:source_extract_governance"]
outputs = ["synthesis", "decision"]
budget = 12

[stages.report_finalize.actors]
mode = "fixed"
count = 1
roles = ["artifact_editor"]

[stages.report_finalize.artifact]
kind = "executive_report"
format = "markdown"
audience = "developer"
require_citations = true

[stages.deck_finalize]
organ = "reasoning"
inputs = ["stage:artifact_strategy", "stage:feedback_triage", "stage:audit", "stage:lens_analysis", "stage:source_extract_orchestration", "stage:source_extract_governance"]
outputs = ["synthesis", "decision"]
budget = 12

[stages.deck_finalize.actors]
mode = "fixed"
count = 1
roles = ["artifact_editor"]

[stages.deck_finalize.artifact]
kind = "strategy_deck"
format = "slides_markdown"
audience = "developer"
require_citations = true

[artifacts.ds4_complete_report]
format = "markdown"
from_stage = "report_finalize"
path = "outputs/ds4-complete-report.md"

[artifacts.ds4_complete_deck]
format = "slides_markdown"
from_stage = "deck_finalize"
path = "outputs/ds4-complete-deck.marp.md"
