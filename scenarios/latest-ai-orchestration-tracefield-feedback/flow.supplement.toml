[flow]
profile = "artifact_governance_supplement"
policy = "fixed"
budget = 160
max_feedback_cycles = 0

[long_run]
enabled = true
cycles = 2
cycle_stages = ["source_discovery", "source_cluster", "source_extract", "hypothesis", "lens_analysis", "audit", "feedback_triage"]
max_work_items = 60
max_feedback_cycles = 4

[process]
enabled = true
organ = "reasoning"
mode = "artifact_governance_supplement"
agent_count = 1
artifact_after_feedback = true
artifact_stages = ["artifact_strategy", "report_architecture", "report_draft", "report_critique", "report_finalize", "deck_storyline", "slide_spec", "slide_draft", "deck_critique", "deck_finalize"]

[process.gates]
enforce_artifact_gate = true
allow_conditional_artifacts = false
require_citations = true
require_evidence_quotes = true
block_publish_on_open_questions = true
block_publish_on_quality_warnings = false
require_manifest = true

[process.stop]
max_cycles = 2
max_feedback_cycles = 4
stop_when = ["manifest_feedback_triaged", "artifact_publishable"]

[actor_scaling]
default_mode = "fixed"
max_total_actors = 24
max_parallel_actors = 2

[feedback]
enabled = false

[feedback_entries]
enabled = true
kind = "tracefield_feedback"
accepted_types = ["change", "requirement", "question", "audit"]
status_field = "status"
max_requests_per_cycle = 8
dedupe_by = ["target", "action", "normalized_request"]

[[feedback_entries.route]]
target_prefix = "input.web"
to = "feedback_triage"
entry_types = ["change", "requirement", "question", "audit"]

[[feedback_entries.route]]
target_prefix = "flow."
to = "feedback_triage"
entry_types = ["change", "requirement", "question", "audit"]

[[feedback_entries.route]]
target_prefix = "artifact."
to = "feedback_triage"
entry_types = ["change", "requirement", "question", "audit"]

[[feedback_entries.route]]
target_prefix = "gates."
to = "feedback_triage"
entry_types = ["change", "requirement", "question", "audit"]

[organs.data]
adapter = "cli"
command = "/Users/rizumita/Workspace/github/ds4/ds4"
model = "/Users/rizumita/Workspace/github/ds4/ds4flash.gguf"
max_tokens = 800
timeout_seconds = 1200

[organs.reasoning]
adapter = "cli"
command = "codex"
model = "codex"

[stages.source_discovery]
organ = "reasoning"
inputs = ["path:inputs/web-supplement/01-developers-openai-com-api-docs-guides-evals.md", "path:inputs/web-supplement/02-developers-openai-com-api-docs-guides-production-best-practices.md", "path:inputs/web-supplement/03-openai-github-io-openai-agents-python-tracing.md", "path:inputs/web-supplement/04-openai-github-io-openai-agents-python-guardrails.md", "path:inputs/web-supplement/05-adk-dev-evaluate.md", "path:inputs/web-supplement/06-adk-dev-agents-workflow-agents.md", "path:inputs/web-supplement/07-learn-microsoft-com-en-us-azure-foundry-concepts-observability.md", "path:inputs/web-supplement/08-www-nist-gov-itl-ai-risk-management-framework.md", "path:inputs/web-supplement/09-www-w3-org-tr-prov-overview.md", "path:inputs/web-supplement/10-spec-c2pa-org-specifications-specifications-2-4-specs-c2pa-specification-html.md"]
outputs = ["question", "observation", "requirement"]
budget = 20

[stages.source_discovery.actors]
mode = "auto"
min = 2
max = 4
scale_by = ["input_count", "open_questions"]
roles = ["source_discovery"]

[stages.source_cluster]
inputs = ["path:inputs/web-supplement/01-developers-openai-com-api-docs-guides-evals.md", "path:inputs/web-supplement/02-developers-openai-com-api-docs-guides-production-best-practices.md", "path:inputs/web-supplement/03-openai-github-io-openai-agents-python-tracing.md", "path:inputs/web-supplement/04-openai-github-io-openai-agents-python-guardrails.md", "path:inputs/web-supplement/05-adk-dev-evaluate.md", "path:inputs/web-supplement/06-adk-dev-agents-workflow-agents.md", "path:inputs/web-supplement/07-learn-microsoft-com-en-us-azure-foundry-concepts-observability.md", "path:inputs/web-supplement/08-www-nist-gov-itl-ai-risk-management-framework.md", "path:inputs/web-supplement/09-www-w3-org-tr-prov-overview.md", "path:inputs/web-supplement/10-spec-c2pa-org-specifications-specifications-2-4-specs-c2pa-specification-html.md"]
outputs = ["synthesis"]
budget = 10

[stages.source_cluster.clustering]
enabled = true
by = ["path_parent", "path"]
max_clusters = 12

[stages.source_cluster.actors]
mode = "none"
roles = ["source_clusterer"]

[stages.source_extract]
organ = "data"
inputs = ["path:inputs/web-supplement/01-developers-openai-com-api-docs-guides-evals.md", "path:inputs/web-supplement/02-developers-openai-com-api-docs-guides-production-best-practices.md", "path:inputs/web-supplement/03-openai-github-io-openai-agents-python-tracing.md", "path:inputs/web-supplement/04-openai-github-io-openai-agents-python-guardrails.md", "path:inputs/web-supplement/05-adk-dev-evaluate.md", "path:inputs/web-supplement/06-adk-dev-agents-workflow-agents.md", "path:inputs/web-supplement/07-learn-microsoft-com-en-us-azure-foundry-concepts-observability.md", "path:inputs/web-supplement/08-www-nist-gov-itl-ai-risk-management-framework.md", "path:inputs/web-supplement/09-www-w3-org-tr-prov-overview.md", "path:inputs/web-supplement/10-spec-c2pa-org-specifications-specifications-2-4-specs-c2pa-specification-html.md"]
outputs = ["observation", "question", "requirement"]
budget = 40

[stages.source_extract.context]
mode = "source_excerpt"
chars_per_entry = 6000
chars_total = 14000
keywords = ["agent", "agentic workflows", "orchestration", "handoffs", "workflow agents", "guardrails", "tracing", "evals", "observability", "provenance", "risk management", "C2PA", "MCP", "A2A"]

[stages.source_extract.actors]
mode = "per_input"
min = 1
max = 10
roles = ["data_actor"]

[stages.hypothesis]
organ = "reasoning"
inputs = ["stage:source_discovery", "stage:source_cluster", "stage:source_extract"]
outputs = ["hypothesis", "question", "requirement"]
budget = 30

[stages.hypothesis.actors]
mode = "auto"
min = 2
max = 5
scale_by = ["budget", "input_count", "open_questions"]

[stages.lens_analysis]
organ = "reasoning"
inputs = ["stage:hypothesis", "stage:source_cluster", "stage:source_extract"]
outputs = ["synthesis", "audit", "question", "requirement"]
budget = 30

[stages.lens_analysis.actors]
mode = "fixed"
count = 4
roles = ["market", "technical", "risk", "operations"]

[stages.audit]
organ = "reasoning"
inputs = ["stage:lens_analysis", "stage:hypothesis", "stage:source_extract"]
outputs = ["audit", "question", "requirement"]
budget = 20

[stages.audit.actors]
mode = "fixed"
count = 2
roles = ["artifact_critic", "citation_auditor"]

[stages.feedback_triage]
organ = "reasoning"
inputs = ["kind:tracefield_feedback", "stage:audit", "stage:lens_analysis"]
outputs = ["change", "requirement", "decision", "question"]
budget = 10

[stages.feedback_triage.actors]
mode = "fixed"
count = 1
roles = ["feedback_router"]

[stages.artifact_strategy]
organ = "reasoning"
inputs = ["stage:feedback_triage", "stage:audit", "stage:lens_analysis"]
outputs = ["synthesis", "decision", "requirement"]
budget = 10

[stages.artifact_strategy.actors]
mode = "fixed"
count = 1
roles = ["artifact_strategist"]

[stages.report_architecture]
organ = "reasoning"
inputs = ["stage:artifact_strategy", "stage:lens_analysis", "stage:audit"]
outputs = ["synthesis"]
budget = 10

[stages.report_architecture.actors]
mode = "fixed"
count = 1
roles = ["artifact_architect"]

[stages.report_draft]
organ = "reasoning"
inputs = ["stage:report_architecture", "stage:lens_analysis", "stage:audit"]
outputs = ["synthesis", "decision", "requirement"]
budget = 25

[stages.report_draft.actors]
mode = "auto"
min = 1
max = 3
scale_by = ["budget", "input_count"]
roles = ["artifact_writer"]

[stages.report_critique]
organ = "reasoning"
inputs = ["stage:report_draft"]
outputs = ["audit", "question"]
budget = 10

[stages.report_critique.actors]
mode = "fixed"
count = 2
roles = ["artifact_critic", "citation_auditor"]

[stages.report_finalize]
organ = "reasoning"
inputs = ["stage:report_draft", "stage:report_critique"]
outputs = ["synthesis", "decision", "requirement"]
budget = 15

[stages.report_finalize.actors]
mode = "fixed"
count = 1
roles = ["artifact_editor"]

[stages.report_finalize.artifact]
kind = "executive_report_supplement"
format = "markdown"
audience = "executive"
require_citations = true

[stages.deck_storyline]
organ = "reasoning"
inputs = ["stage:artifact_strategy", "stage:lens_analysis"]
outputs = ["synthesis"]
budget = 10

[stages.deck_storyline.actors]
mode = "fixed"
count = 1
roles = ["artifact_strategist"]

[stages.slide_spec]
organ = "reasoning"
inputs = ["stage:deck_storyline", "stage:lens_analysis"]
outputs = ["synthesis"]
budget = 10

[stages.slide_spec.actors]
mode = "fixed"
count = 1
roles = ["artifact_architect"]

[stages.slide_draft]
organ = "reasoning"
inputs = ["stage:slide_spec", "stage:lens_analysis", "stage:audit"]
outputs = ["synthesis", "decision", "requirement"]
budget = 25

[stages.slide_draft.actors]
mode = "auto"
min = 2
max = 4
scale_by = ["budget", "input_count"]
roles = ["artifact_writer"]

[stages.deck_critique]
organ = "reasoning"
inputs = ["stage:slide_draft"]
outputs = ["audit", "question"]
budget = 10

[stages.deck_critique.actors]
mode = "fixed"
count = 2
roles = ["artifact_critic", "citation_auditor"]

[stages.deck_finalize]
organ = "reasoning"
inputs = ["stage:slide_draft", "stage:deck_critique"]
outputs = ["synthesis", "decision", "requirement"]
budget = 15

[stages.deck_finalize.actors]
mode = "fixed"
count = 1
roles = ["artifact_editor"]

[stages.deck_finalize.artifact]
kind = "strategy_deck_supplement"
format = "slides_markdown"
audience = "executive"
require_citations = true

[artifacts.executive_report_supplement]
format = "markdown"
from_stage = "report_finalize"
path = "outputs/report-supplement.md"

[artifacts.strategy_deck_supplement]
format = "slides_markdown"
from_stage = "deck_finalize"
path = "outputs/deck-supplement.md"
