# 弱/中位ローカルモデルで仕様インタロゲーション。弱モデルが何次の盲点まで発見できるか。
[flow]
profile = "spec-interrogation-ollama"
policy = "fixed"
[actor_scaling]
default_mode = "fixed"
max_total_actors = 10
max_parallel_actors = 1
[organs.reasoning]
adapter = "ollama"
model = "qwen3.6:27b"
timeout_seconds = 600
[stages.interrogate]
organ = "reasoning"
inputs = ["path:task.md", "kind:input"]
outputs = ["observation", "question"]
[stages.interrogate.actors]
mode = "fixed"
count = 5
roles = ["QANSWER", "PROBLEMATIZE", "INVERT", "HARM", "ASCEND"]
