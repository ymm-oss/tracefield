[flow]
profile = "lens_conflict_peer_cycles"
policy = "fixed"
budget = 40
max_feedback_cycles = 0

[long_run]
enabled = true
cycles = 4
cycle_stages = ["analysis"]

[actor_scaling]
default_mode = "fixed"
max_total_actors = 6
max_parallel_actors = 3

[feedback]
enabled = false

[feedback_entries]
enabled = false

[organs.reason]
adapter = "cli"
command = "claude"
model = "claude-sonnet-4-6"
max_tokens = 1500
timeout_seconds = 600

[stages.analysis]
organ = "reason"
inputs = ["path:task.md", "stage:analysis"]
outputs = ["observation", "question", "decision"]
budget = 30

[stages.analysis.actors]
mode = "fixed"
count = 6
roles = ["BE", "FIN", "TOC", "REVERS", "DEONT", "PHENO"]
